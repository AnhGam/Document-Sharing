name: CI Build

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]

env:
  SOLUTION_FILE: study-document-manager.sln
  PROJECT_FILE: study-document-manager/study-document-manager.csproj
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: msbuild ${{ env.SOLUTION_FILE }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /t:Rebuild

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            study-document-manager/bin/Release/
            !study-document-manager/bin/Release/*.pdb
          retention-days: 7
