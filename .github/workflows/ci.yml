
on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]

env:
  SOLUTION_FILE: document-sharing-manager.sln
  BUILD_CONFIGURATION: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-and-lint:
    name: Security and Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanner (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build and Advanced Testing
    needs: security-and-lint
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: microsoft/setup-msbuild@v2
      
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and Optimize Assets
        run: |
          nuget restore ${{ env.SOLUTION_FILE }}
          dotnet restore document-sharing-manager.Tests/document-sharing-manager.Tests.csproj
          powershell ./scripts/optimize-assets.ps1

      - name: Dependency Audit and Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          dotnet list document-sharing-manager.Tests/document-sharing-manager.Tests.csproj package --vulnerable > audit_log.txt || true
          powershell ./scripts/security-auditor-groq.ps1 -AuditLog audit_log.txt -ApiKey "${{ env.GROQ_API_KEY }}"

      - name: Build Solution (Zero Warning Policy)
        run: msbuild ${{ env.SOLUTION_FILE }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /t:Rebuild /p:TreatWarningsAsErrors=true

      - name: Run Advanced Tests (NUnit)
        run: |
          dotnet test document-sharing-manager.Tests/document-sharing-manager.Tests.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "trx;LogFileName=test_results.trx"
        continue-on-error: true

#      - name: Mutation Testing (Stryker)
#        run: |
#          dotnet tool install -g dotnet-stryker
#          cd document-sharing-manager.Tests
#          dotnet stryker --solution ../${{ env.SOLUTION_FILE }}
#        continue-on-error: true

      - name: Build Installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          powershell -Command "if (Test-Path 'installer/*.exe') { Write-Host 'Installer Success' } else { exit 1 }"

      - name: AI Build Failure Analysis (Gemini)
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: powershell ./scripts/ai-log-analyzer.ps1 -ApiKey "${{ env.GEMINI_API_KEY }}"



      - name: Archive Build Reports (GitOps)
        if: always()
        env:
          REPO_URL: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        run: |
          powershell ./scripts/publish-reports.ps1 -RepoUrl "${{ env.REPO_URL }}" -CommitSha "${{ github.sha }}" -RunId "${{ github.run_id }}" -BuildStatus "${{ job.status }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: document-sharing-manager-v${{ github.run_number }}
          path: |
            installer/*.exe
            document-sharing-manager.Tests/StrykerOutput/
            *.md
          retention-days: 7

  capacity-and-governance:
    name: Capacity & FinOps Governance
    needs: build-and-test
    runs-on: windows-latest
    outputs:
      installer_size: ${{ steps.capacity.outputs.installer_size }}
      repo_size: ${{ steps.capacity.outputs.repo_size }}
      build_duration: ${{ steps.capacity.outputs.build_duration }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: document-sharing-manager-v${{ github.run_number }}
          path: .

      - name: Run Capacity Check & DORA Analytics
        id: capacity
        run: |
          $startTime = [DateTimeOffset]::Parse("${{ github.event.repository.pushed_at }}").ToUnixTimeSeconds()
          $now = [DateTimeOffset]::Now.ToUnixTimeSeconds()
          $duration = $now - $startTime
          powershell ./scripts/capacity-governance.ps1 -MaxInstallerSizeMB 50 -MaxRepoSizeMB 500 -BuildDurationSeconds $duration

      - name: Publish Capacity Report
        if: always()
        run: |
          cat capacity_report.md >> $GITHUB_STEP_SUMMARY

  notify:
    name: Discord Notification
    needs: [build-and-test, capacity-and-governance]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord Webhook 2.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            STATUS="${{ needs.build-and-test.result }}"
            COLOR=3066993
            if [ "$STATUS" != "success" ]; then COLOR=15158332; fi
            
            # Enhanced summary for the notification
            INSTALLER_SIZE="${{ needs.capacity-and-governance.outputs.installer_size }}"
            REPO_SIZE="${{ needs.capacity-and-governance.outputs.repo_size }}"
            DURATION="${{ needs.capacity-and-governance.outputs.build_duration }}"
            
            MSG="**Project:** Document Sharing Manager\n**Author:** ${{ github.actor }}\n**Commit:** ${{ github.sha }}\n\n"
            MSG="$MSG**[DORA & Capacity Metrics]**\n"
            MSG="$MSG- **Lead Time (CI):** $DURATION min\n"
            MSG="$MSG- **Installer Size:** $INSTALLER_SIZE MB\n"
            MSG="$MSG- **Repo Size:** $REPO_SIZE MB\n"
            MSG="$MSG- **Status:** $STATUS\n\n"
            MSG="$MSG[View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

            curl -H "Content-Type: application/json" \
              -d "{\"embeds\": [{\"title\": \"🚀 CI/CD Pipeline Performance: $STATUS\", \"description\": \"$MSG\", \"color\": $COLOR}]}" \
              $DISCORD_WEBHOOK
          fi
