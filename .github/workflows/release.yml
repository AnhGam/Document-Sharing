name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  SOLUTION_FILE: study-document-manager.sln
  PROJECT_FILE: study-document-manager/study-document-manager.csproj
  BUILD_CONFIGURATION: Release
  APP_NAME: StudyDocumentManager

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: msbuild ${{ env.SOLUTION_FILE }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /t:Rebuild

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $outputDir = "study-document-manager/bin/Release"
          $zipName = "${{ env.APP_NAME }}_${version}_portable.zip"

          # Create zip excluding debug files
          Compress-Archive -Path "$outputDir/*" -DestinationPath $zipName -Force

          echo "PORTABLE_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Download and setup Inno Setup
        shell: pwsh
        run: |
          # Download Inno Setup
          $innoUrl = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile "innosetup.exe"

          # Install silently
          Start-Process -FilePath "innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait

          # Add to PATH
          $innoPath = "C:\Program Files (x86)\Inno Setup 6"
          echo "$innoPath" >> $env:GITHUB_PATH

      - name: Create Inno Setup script
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $script = @"
          #define MyAppName "${{ env.APP_NAME }}"
          #define MyAppVersion "$version"
          #define MyAppPublisher "Study Document Manager"
          #define MyAppExeName "study-document-manager.exe"

          [Setup]
          AppId={{1F3BD953-F9F2-4C60-AA9B-910FB2379F9B}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          AllowNoIcons=yes
          OutputDir=.
          OutputBaseFilename={#MyAppName}_Setup_{#MyAppVersion}
          SetupIconFile=study-document-manager\assets\logo\logo.ico
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest
          PrivilegesRequiredOverridesAllowed=dialog

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"
          Name: "vietnamese"; MessagesFile: "compiler:Languages\Vietnamese.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "study-document-manager\bin\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\{cm:UninstallProgram,{#MyAppName}}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@

          $script | Out-File -FilePath "setup.iss" -Encoding UTF8

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: List output files
        shell: pwsh
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object { Write-Host $_.Name }
          Get-ChildItem -Filter "*.zip" | ForEach-Object { Write-Host $_.Name }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Study Document Manager v${{ steps.version.outputs.version }}

            ### Downloads
            - **Setup Installer**: `${{ env.APP_NAME }}_Setup_${{ steps.version.outputs.version }}.exe` - Recommended for most users
            - **Portable Version**: `${{ env.APP_NAME }}_${{ steps.version.outputs.version }}_portable.zip` - No installation required

            ### System Requirements
            - Windows 10/11
            - .NET Framework 4.8

            ### Changes
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            ${{ env.APP_NAME }}_Setup_${{ steps.version.outputs.version }}.exe
            ${{ env.APP_NAME }}_${{ steps.version.outputs.version }}_portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (for manual workflow)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: |
            ${{ env.APP_NAME }}_Setup_${{ steps.version.outputs.version }}.exe
            ${{ env.APP_NAME }}_${{ steps.version.outputs.version }}_portable.zip
          retention-days: 30
