
services:
  db:
    image: postgres:15-alpine
    container_name: docshare_db
    environment:
      POSTGRES_DB: docshare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docshare"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docshare_api
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ConnectionStrings__DefaultConnection=Host=db;Database=docshare;Username=postgres;Password=${POSTGRES_PASSWORD}
    develop:
      watch:
        - action: rebuild
          path: .
          target: /src
          ignore:
            - bin/
            - obj/
            - documents/
            - .git/
        - action: sync
          path: ./Core
          target: /src/Core
        - action: sync
          path: ./Infrastructure
          target: /src/Infrastructure
    ports:
      - "${API_PORT}:5000"
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  api_uploads:
